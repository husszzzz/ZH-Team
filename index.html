<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="موقع ZH Team لمشاهدة كرة القدم وكأس العالم بث مباشر">
    <title>ZH Team | بث مباشر للمباريات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================================
           CSS Styles & Animations
           ======================================================== */
        :root {
            --primary-color: #e50914; 
            --dark-glass: rgba(15, 15, 20, 0.7);
            --light-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            user-select: none; 
        }

        body {
            background-color: #000;
            background-image: url('https://l.top4top.io/p_3844ry0pt0.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 100%);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 40px 20px 20px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            width: 150px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .welcome-msg {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            background: linear-gradient(90deg, #fff, #b3b3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rights-msg {
            font-size: 16px;
            color: #ffd700; 
            font-weight: 700;
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .player-wrapper {
            width: 100%;
            max-width: 900px;
            background: var(--dark-glass);
            border: 1px solid var(--light-glass);
            border-radius: 20px;
            padding: 30px 20px;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        .controls-section {
            width: 100%;
        }

        .channel-title {
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--light-glass);
            padding-bottom: 10px;
            color: #fff;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
            transform: translateY(0);
        }

        footer {
            margin-top: auto;
            width: 100%;
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid var(--light-glass);
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        
        footer a {
            text-decoration: none; 
        }

        footer span {
            color: var(--primary-color);
            transition: color 0.3s;
        }
        
        footer span:hover {
            color: #ffd700; 
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .welcome-msg { font-size: 22px; }
            .rights-msg { font-size: 14px; }
            .btn { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="overlay-bg"></div>

    <header>
        <img src="https://a.top4top.io/p_3844im97j1.png" alt="ZH Team Logo" class="logo">
        <h1 class="welcome-msg">مرحبا بكم في موقع ZH Team لمشاهدة كرة القدم وكأس العالم</h1>
        <div class="rights-msg">الموقع تابع إلى قناه @hassanyIPA و قناه @C9_9P</div>
    </header>

    <main class="player-wrapper">
        <div class="controls-section">
            
            <h2 class="channel-title">مشاهدة قناة BEIN SPORT 1</h2>
            <div class="buttons-grid">
                <button class="btn" onclick="openStream('aHR0cHM6Ly9mYWNreW91LWNkbjQuY2ZkL2lwdHYtMS9pbmRleC5tM3U4')">
                    البث الأول (سيرفر رئيسي)
                </button>
                <button class="btn" onclick="openStream('aHR0cDovL3Rlc3Qtc3BvcnRpbmEuY2ZkOjc3NzcvbWF4MS1nL3RyYWNrcy12MWExL21vbm8ubTN1OA==')">
                    البث الثاني (سيرفر احتياطي)
                </button>
            </div>

            <h2 class="channel-title">مشاهدة قناة BEIN SPORT 2</h2>
            <div class="buttons-grid">
                <button class="btn" onclick="openStream('aHR0cHM6Ly9mYWNreW91LWNkbjQuY2ZkL2lwdHYtMi9pbmRleC5tM3U4')">
                    البث الأول (سيرفر رئيسي)
                </button>
                <button class="btn" onclick="openStream('aHR0cDovL3Rlc3Qtc3BvcnRpbmEuY2ZkOjc3NzcvbWF4Mi1nL3RyYWNrcy12MWExL21vbm8ubTN1OA==')">
                    البث الثاني (سيرفر احتياطي)
                </button>
            </div>

            <h2 class="channel-title">مشاهدة قناة BEIN SPORT 3</h2>
            <div class="buttons-grid">
                <button class="btn" onclick="openStream('aHR0cHM6Ly9mYWNreW91LWNkbjQuY2ZkL2lwdHYtMy9pbmRleC5tM3U4')">
                    البث الأول (سيرفر رئيسي)
                </button>
            </div>
            
        </div>
    </main>

    <footer>
        تم البرمجة بواسطة 
        <a href="https://t.me/hassanyIPA" target="_blank"><span>حسين الحسني</span></a> 
        و 
        <a href="https://t.me/C9_9P" target="_blank"><span>عبود سكوفيلد</span></a>
    </footer>

    <script>
        // دالة حفظ الشفرة في الذاكرة وفتح صفحة المشغل نظيفة
        function openStream(base64Url) {
            localStorage.setItem('zh_stream_key', base64Url); // حفظ الشفرة
            window.open('player.html', '_blank'); // فتح صفحة المشغل في تاب جديد
        }

        // الحماية
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } 
        }

        document.ondragstart = function() { return false; }
    </script>
</body>
</html>
